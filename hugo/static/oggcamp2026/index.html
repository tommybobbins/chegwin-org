# Linus Torvalds

Note:

- In 1990/1991 there was little choice running UNIX cheaply
- Minix was a 16-bit academic/teaching operating system, running on PCs ( <= 286)
- Licence was cheap ($69), but not free.
- Linus created a 386 kernel for minix
- Later added GNU tools, filesystem and for the boot and root floppies.
- First distro (Linux plus utilities) was MCC Interim Linux created by Owen Le Blanc
- Governments were starting to worry about the ability/ubiquity of computing.
