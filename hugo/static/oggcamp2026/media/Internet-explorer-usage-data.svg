            <use xlink:href="#vertical_line" x="2013" y="0"/>
            <use xlink:href="#vertical_line" x="2014" y="0"/>
            <use xlink:href="#vertical_line" x="2015" y="0"/>
            <use xlink:href="#vertical_line" x="2016" y="0"/>
            <use xlink:href="#vertical_line" x="2017" y="0"/>
            <use xlink:href="#vertical_line" x="2018" y="0"/>
            <use xlink:href="#vertical_line" x="2019" y="0"/>
            <use xlink:href="#vertical_line" x="2020" y="0"/>
            <use xlink:href="#vertical_line" x="2021" y="0"/>
            <use xlink:href="#vertical_line" x="2022" y="0"/>
            <use xlink:href="#vertical_line" x="2023" y="0"/>
            <use xlink:href="#vertical_line" x="2024" y="0"/>
        </g>
    </g>
    <!-- Text can't be scaled or it goes strange. Its location must be calculated directly. -->
    <g id="percentage_numbers" transform="translate(-3, 6)" style="text-anchor: end;">
        <text x="10" y="290">0%</text>
        <text x="10" y="240">20%</text>
        <text x="10" y="190">40%</text>
        <text x="10" y="140">60%</text>
        <text x="10" y="90">80%</text>
        <text x="10" y="40">100%</text>
        <text x="60" y="65">Market share</text>
    </g>
    <g id="x_axis_numbers" transform="translate(9, 20)" style="text-anchor: middle;">
<text x="40"    y="290">1995</text>
<text x="102.5" y="290">1997</text>
<text x="165"   y="290">1999</text>
<text x="227.5" y="290">2001</text>
